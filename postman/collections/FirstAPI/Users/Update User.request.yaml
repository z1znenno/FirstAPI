$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/users/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Alice Updated",
      "age": 31,
      "login": "aliceupdated"
    }
description: Update an existing user by ID.
