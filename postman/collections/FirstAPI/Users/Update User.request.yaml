$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/users/1'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "id": 1,
      "name": "Alice Updated",
      "age": 31
    }
description: Update an existing user by ID.
