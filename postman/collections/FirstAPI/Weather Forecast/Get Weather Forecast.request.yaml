$kind: http-request
name: Get Weather Forecast
method: GET
url: '{{baseUrl}}/weatherforecast'
order: 1000
headers:
  - key: Accept
    value: application/json
description: Returns a 5-day weather forecast. Each item includes Date, TemperatureC, TemperatureF, and Summary.
examples: './.resources/Get Weather Forecast.resources/examples'
