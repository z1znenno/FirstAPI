          "summary": "Freezing"
        },
        {
          "date": "2026-04-17",
          "temperatureC": 15,
          "temperatureF": 58,
          "summary": "Cool"
        },
        {
          "date": "2026-04-18",
          "temperatureC": 30,
          "temperatureF": 85,
          "summary": "Hot"
        },
        {
          "date": "2026-04-19",
          "temperatureC": 8,
          "temperatureF": 46,
