$kind: http-request
name: Add Todo
method: POST
url: "{{baseUrl}}/api/todo"
auth:
  type: jwt
order: 2000
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
      "title": "My_New_Task",
      "isCompleted": false
    }
description: Create a new todo item for a user.
