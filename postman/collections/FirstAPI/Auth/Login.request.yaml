$kind: http-request
name: Login
method: POST
url: "{{baseUrl}}/api/auth/login"
order: 1000
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "login": "login",
      "password": "password"
    }
description: Authenticate a user and receive a JWT token.
