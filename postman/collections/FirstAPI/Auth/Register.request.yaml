$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "age": 25,
      "login": "johndoe",
      "password": "secret123"
    }
description: Register a new user and receive a JWT token.
